    .chat-md em { color: #3f3f46; font-style: italic; }

    .chat-md li { margin: .18em 0; }
    .chat-md code { background: #f4f4f5; padding: 1px 5px; border-radius: 4px; font-size: .9em; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #18181b; }

    .chat-md a { color: #4f46e5; text-decoration: underline; text-underline-offset: 2px; }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ─────────────────────────── Constants ───────────────────────────
const STAGES = ["意向中", "已投递", "笔试/测评", "面试中", "Offer", "已结束"];

// 每个阶段一个小圆点色（极简：不再铺满背景，只用 1.5px 色点）

const STAGE_CHIP = {

  "已投递":    "bg-blue-50 text-blue-700 ring-blue-200",
  "笔试/测评": "bg-amber-50 text-amber-700 ring-amber-200",

};

const TYPES = ["实习", "校招全职"];
const DEADLINE_KINDS = ["网申", "笔试", "面试", "Offer"];
const FORMATS = ["线上", "线下", "电话"];
const CLOSE_REASONS = ["已拒信", "主动放弃", "已录取"];
const MATERIAL_KEYS = [
  { key: "resume",       label: "简历" },
  { key: "coverLetter",  label: "Cover Letter" },
  { key: "transcript",   label: "成绩单" },
  { key: "portfolio",    label: "作品集" },
];
const MAX_CHAT_ATTACHMENTS = 3;
const MAX_DOC_TEXT_CHARS = 12000;
const MAX_IMAGE_DIMENSION = 1400;
const MAX_CHAT_FILE_BYTES = 8 * 1024 * 1024;
const MAX_IMAGE_DATA_URL_LENGTH = 4_500_000;
const STORAGE_KEY = "jobApplications.v1";

// ─────────────────────────── Utils ───────────────────────────
const uid = () => (crypto?.randomUUID?.() ?? `id-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const diffDays = (dateStr, base = todayStr()) => {
  const a = new Date(dateStr); const b = new Date(base);
  return Math.round((a - b) / 86400000);
};
const trimText = (v) => typeof v === "string" ? v.trim() : "";
const truncateText = (text, max = 160) => {
  const v = trimText(text);
  return v.length > max ? `${v.slice(0, max)}...` : v;
};
const formatFileSize = (bytes = 0) => {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
};
const readFileAsText = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(String(reader.result || ""));
  reader.onerror = () => reject(new Error("文件读取失败"));
  reader.readAsText(file, "utf-8");
});
const readFileAsArrayBuffer = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result);
  reader.onerror = () => reject(new Error("文件读取失败"));
  reader.readAsArrayBuffer(file);
});
const loadImage = (src) => new Promise((resolve, reject) => {
  const img = new Image();
  img.onload = () => resolve(img);
  img.onerror = () => reject(new Error("图片读取失败"));
  img.src = src;
});
async function compressImageFile(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(new Error("图片读取失败"));
    reader.readAsDataURL(file);
  });
  const img = await loadImage(dataUrl);
  const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(img.width, img.height));
  const width = Math.max(1, Math.round(img.width * scale));
  const height = Math.max(1, Math.round(img.height * scale));
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, width, height);
  const compressed = canvas.toDataURL("image/jpeg", 0.82);
  if (compressed.length > MAX_IMAGE_DATA_URL_LENGTH) {
    throw new Error("图片过大，请换更小的图片或改传 PDF / DOCX");
  }
  return compressed;
}
async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error("PDF 解析器未加载");
  if (!window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
  const arrayBuffer = await readFileAsArrayBuffer(file);
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const chunks = [];
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(" ").replace(/\s+/g, " ").trim();
    if (pageText) chunks.push(pageText);
  }
  const text = chunks.join("\n");
  if (!trimText(text)) throw new Error("PDF 未提取到文本，可能是扫描版。建议改传图片或可编辑文档。");
  return text;
}
async function extractDocxText(file) {
  if (!window.mammoth) throw new Error("DOCX 解析器未加载");
  const arrayBuffer = await readFileAsArrayBuffer(file);
  const result = await window.mammoth.extractRawText({ arrayBuffer });
  const text = result.value || "";
  if (!trimText(text)) throw new Error("DOCX 未提取到文本");
  return text;
}
function normalizeExtractedText(text) {
  return trimText(String(text || "").replace(/\r/g, "").replace(/\n{3,}/g, "\n\n")).slice(0, MAX_DOC_TEXT_CHARS);
}
async function prepareChatAttachment(file) {
  if (file.size > MAX_CHAT_FILE_BYTES) {
    throw new Error(`文件过大：${file.name} 超过 ${formatFileSize(MAX_CHAT_FILE_BYTES)}`);
  }
  const type = file.type || "";
  const lowerName = file.name.toLowerCase();
  const base = {
    id: uid(),
    name: file.name,
    mimeType: type || "application/octet-stream",
    size: file.size,
    sizeLabel: formatFileSize(file.size),
  };

  if (type.startsWith("image/")) {
    const imageDataUrl = await compressImageFile(file);
    return {
      ...base,
      kind: "image",
      imageDataUrl,
      displayType: "图片",
    };
  }
  if (type === "application/pdf" || lowerName.endsWith(".pdf")) {
    return {
      ...base,
      kind: "document",
      text: normalizeExtractedText(await extractPdfText(file)),
      displayType: "PDF",
    };
  }
  if (type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document" || lowerName.endsWith(".docx")) {
    return {
      ...base,
      kind: "document",
      text: normalizeExtractedText(await extractDocxText(file)),
      displayType: "DOCX",
    };
  }
  if (type.startsWith("text/") || /\.(txt|md|markdown)$/i.test(lowerName)) {
    return {
      ...base,
      kind: "document",
      text: normalizeExtractedText(await readFileAsText(file)),
      displayType: "文本",
    };
  }
  if (lowerName.endsWith(".doc")) {
    throw new Error("暂不支持 .doc，请先另存为 .docx 或 PDF");
  }
  throw new Error("仅支持 PDF、DOCX、TXT、Markdown 和图片文件");
}
function buildUserMessagePayload(text, attachments) {
  const intro = trimText(text) || (attachments.length ? "我上传了简历/材料，请先阅读并结合我的申请情况给建议。" : "");
  const parts = [{ type: "text", text: intro }];
  attachments.forEach(att => {
    if (att.kind === "image") {
      parts.push({ type: "text", text: `附件图片：${att.name}` });
      parts.push({ type: "image_url", image_url: { url: att.imageDataUrl } });
    } else if (att.kind === "document") {
      parts.push({ type: "text", text: `附件文档《${att.name}》内容如下：\n${att.text}` });
    }
  });
  return parts.length === 1 ? intro : parts;
}
const nextDeadline = (app) => {
  const t = todayStr();
  const future = (app.deadlines ?? []).filter(d => d.date && d.date >= t)
    .sort((a, b) => a.date.localeCompare(b.date));
  return future[0] ?? null;
};
const deadlineLevel = (days) => {
  if (days == null) return "none";
  if (days <= 3) return "red";
  if (days <= 7) return "yellow";
  return "green";
};
const LEVEL_STYLE = {
  red:    "text-rose-700 bg-rose-50 ring-rose-200",
  yellow: "text-amber-700 bg-amber-50 ring-amber-200",
  green:  "text-emerald-700 bg-emerald-50 ring-emerald-200",
  none:   "text-zinc-500 bg-zinc-50 ring-zinc-200",

// ─────────────────────────── Icons (inline SVG, lucide-inspired) ───────────────────────────
const Icon = ({ name, className = "w-4 h-4", strokeWidth = 1.75 }) => {
  const common = { fill: "none", stroke: "currentColor", strokeWidth, strokeLinecap: "round", strokeLinejoin: "round" };
  const paths = {

    grid:      <><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></>,
    list:      <><path d="M8 6h13M8 12h13M8 18h13" /><circle cx="3.5" cy="6" r=".8" /><circle cx="3.5" cy="12" r=".8" /><circle cx="3.5" cy="18" r=".8" /></>,
    trash:     <><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14" /></>,

    trophy:    <><path d="M8 21h8M12 17v4M7 4h10v3a5 5 0 1 1-10 0V4zM5 6H3a2 2 0 0 0 2 4M19 6h2a2 2 0 0 1-2 4" /></>,

const offset = (n) => {
  const d = new Date(); d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const generateJobDescription = (app = {}) => {
  const company = trimText(app.company) || "目标公司";
  const position = trimText(app.position) || "目标岗位";
  const typeLabel = app.type === "校招全职" ? "校招生" : "实习生";

  if (/产品/.test(text)) {
    return [

      `3. 有用户研究、校园项目、产品实习或数据分析经验者优先。`,
    ].join("\n");
  }

  if (/后端/.test(text)) {
    return [
      `岗位职责`,

      `3. 参与线上问题定位、技术文档沉淀和工程规范建设，提升系统可维护性。`,
      ``,
      `任职要求`,
      `1. 面向 ${typeLabel}，计算机基础扎实，熟悉数据结构、操作系统、网络和数据库。`,

  if (/前端/.test(text)) {
    return [
      `岗位职责`,
      `1. 参与 ${company} Web 或中后台产品的前端开发，负责页面搭建、组件封装和交互实现。`,

      `3. 参与前端工程化建设，包括代码规范、构建优化、埋点监控与质量保障。`,
      ``,

function useApplications() {
  const [apps, setApps] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed.map(normalizeApplication);
      }
    } catch {}
    return seed();
  });
  const timer = useRef(null);
  useEffect(() => {
    clearTimeout(timer.current);
    timer.current = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(apps)); } catch {}
    }, 300);
    return () => clearTimeout(timer.current);
  }, [apps]);
  return [apps, setApps];
}
function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mobile;
}

function MetricCards({ apps }) {

    const offers = apps.filter(a => a.stage === "Offer" || a.closeReason === "已录取").length;

      const nd = nextDeadline(a); return nd && diffDays(nd.date) <= 7;

    return { total: apps.length, interviewing, offers, soon };
  }, [apps]);
  const cards = [

    { label: "即将到期",   value: m.soon,         hint: "7 天内 deadline", icon: "flame",     accent: "text-rose-600" },
  ];
  return (
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">

function KanbanView({ apps, setApps, onOpen, onQuickAdd, setCloseReasonFor }) {
  const grouped = useMemo(() => {
    const g = Object.fromEntries(STAGES.map(s => [s, []]));
    apps.forEach(a => { (g[a.stage] ?? g["意向中"]).push(a); });
    return g;
  }, [apps]);

  const draggingId = useRef(null);
  const onDragStart = (e, app) => {
    draggingId.current = app.id;
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", app.id);
    e.currentTarget.classList.add("dragging");
  };
  const onDragEnd = (e) => {
    e.currentTarget.classList.remove("dragging");
    draggingId.current = null;
  };
  const onDrop = (targetStage) => {
    const id = draggingId.current;
    if (!id) return;
    const app = apps.find(a => a.id === id);
    if (!app || app.stage === targetStage) return;
    if (targetStage === "已结束") { setCloseReasonFor(id); return; }
    setApps(prev => prev.map(a => a.id === id ? { ...a, stage: targetStage, closeReason: undefined, updatedAt: Date.now() } : a));
  };

  return (
    <div className="flex gap-3 overflow-x-auto pb-4 -mx-4 px-4 md:mx-0 md:px-0">
      {STAGES.map(s => (
        <KanbanColumn key={s} stage={s} apps={grouped[s]} onOpen={onOpen}
          onQuickAdd={onQuickAdd}
          drag={{ onDragStart, onDragEnd, onDrop }} />
      ))}
    </div>
  );
}

  const [sortBy, setSortBy] = useState("deadline");
  const rows = useMemo(() => {
    let r = stageFilter === "全部" ? [...apps] : apps.filter(a => a.stage === stageFilter);
    if (sortBy === "deadline") {
      r.sort((a, b) => (nextDeadline(a)?.date ?? "9999-12-31").localeCompare(nextDeadline(b)?.date ?? "9999-12-31"));
    } else {
      r.sort((a, b) => (b.appliedAt || "").localeCompare(a.appliedAt || ""));
    }
    return r;
  }, [apps, stageFilter, sortBy]);

  return (
    <div className="bg-white rounded-2xl elevate-1 overflow-hidden">
      <div className="flex flex-wrap items-center gap-2 px-5 py-3 border-b border-zinc-100">
        <span className="text-[11px] uppercase tracking-wider text-zinc-500">阶段</span>
        <select value={stageFilter} onChange={e => setStageFilter(e.target.value)} className={inputCls + " w-auto py-1.5"}>
          <option value="全部">全部</option>
          {STAGES.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <span className="text-[11px] uppercase tracking-wider text-zinc-500 ml-3">排序</span>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className={inputCls + " w-auto py-1.5"}>
          <option value="deadline">最近 deadline</option>
          <option value="applied">投递日期</option>
        </select>
        <span className="text-[11px] text-zinc-400 ml-auto tnum">共 {rows.length} 条</span>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-[13px]">
          <thead className="text-zinc-500 text-[11px] uppercase tracking-wider">
            <tr className="border-b border-zinc-100">
              <th className="text-left px-5 py-2.5 font-medium">公司</th>
              <th className="text-left px-5 py-2.5 font-medium">岗位</th>
              <th className="text-left px-5 py-2.5 font-medium">类型</th>
              <th className="text-left px-5 py-2.5 font-medium">阶段</th>
              <th className="text-left px-5 py-2.5 font-medium">最近 Deadline</th>
              <th className="text-left px-5 py-2.5 font-medium">材料</th>
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan="6" className="text-center text-zinc-400 py-12 text-[13px]">暂无数据</td></tr>
            )}
            {rows.map(a => {
              const nd = nextDeadline(a);
              const days = nd ? diffDays(nd.date) : null;
              const lvl = deadlineLevel(days);
              const done = MATERIAL_KEYS.filter(m => a.materials?.[m.key]).length;
              return (
                <tr key={a.id} onClick={() => onOpen(a.id)}
                  className="border-b border-zinc-50 hover:bg-zinc-50/50 cursor-pointer transition">
                  <td className="px-5 py-3 font-medium text-zinc-900">{a.company}</td>
                  <td className="px-5 py-3 text-zinc-700">{a.position}</td>
                  <td className="px-5 py-3 text-zinc-500">{a.type}</td>
                  <td className="px-5 py-3"><StageChip stage={a.stage} /></td>
                  <td className="px-5 py-3 tnum">
                    {nd ? (
                      <span className={`text-[11px] px-2 py-0.5 rounded-md ring-1 ${LEVEL_STYLE[lvl]}`}>
                        {nd.kind} · {nd.date} · {days < 0 ? `已过 ${-days} 天` : days === 0 ? "今天" : `${days} 天`}
                      </span>
                    ) : a.closeReason ? (
                      <span className="text-[11px] text-zinc-500">{a.closeReason}</span>
                    ) : <span className="text-[11px] text-zinc-400">—</span>}
                  </td>
                  <td className="px-5 py-3 text-[11px] text-zinc-500 tnum">{done}/{MATERIAL_KEYS.length}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─────────────────────────── Modal shell ───────────────────────────
function Modal({ open, onClose, title, subtitle, children, footer, maxWidth = "max-w-2xl" }) {
  useEffect(() => {
    if (!open) return;
    const onEsc = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onEsc);
    return () => window.removeEventListener("keydown", onEsc);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4" onClick={onClose}>
      <div className={`bg-white rounded-2xl elevate-modal w-full ${maxWidth} max-h-[90vh] flex flex-col`} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-zinc-100 shrink-0">
          <div>
            <div className="text-[15px] font-semibold text-zinc-900">{title}</div>
            {subtitle && <div className="text-[12px] text-zinc-500 mt-0.5">{subtitle}</div>}
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-lg hover:bg-zinc-100 text-zinc-500 hover:text-zinc-900 flex items-center justify-center transition">
            <Icon name="close" />
          </button>
        </div>
        <div className="px-6 py-5 overflow-y-auto">{children}</div>
        {footer && <div className="px-6 py-3.5 border-t border-zinc-100 flex items-center justify-end gap-2 bg-zinc-50/60 shrink-0 rounded-b-2xl">{footer}</div>}
      </div>
    </div>
  );
}

// ─────────────────────────── Create modal ───────────────────────────
function CreateModal({ open, onClose, onSave, initialStage }) {
  const [form, setForm] = useState(null);
  useEffect(() => {
    if (open) {
      setForm({
        company: "", position: "", type: "实习",
        stage: initialStage || "意向中",
        appliedAt: initialStage && initialStage !== "意向中" ? todayStr() : "",
        jd: "",
      });
    }
  }, [open, initialStage]);
  if (!form) return null;
  const canSave = form.company.trim() && form.position.trim();
  const save = () => {
    if (!canSave) return;
    onSave({
      id: uid(),
      company: form.company.trim(), position: form.position.trim(),
      type: form.type, stage: form.stage, appliedAt: form.appliedAt,
      deadlines: [], materials: { resume: false, coverLetter: false, transcript: false, portfolio: false },
      interviews: [], note: "", jd: form.jd.trim() || generateJobDescription(form),
      createdAt: Date.now(), updatedAt: Date.now(),
    });
  };
  return (
    <Modal open={open} onClose={onClose} title="新增申请" subtitle="必填公司与岗位，JD 可先粘贴原文或稍后再补"
      maxWidth="max-w-lg"
      footer={<><Button variant="ghost" onClick={onClose}>取消</Button>
               <Button onClick={save} disabled={!canSave} className={!canSave ? "opacity-50 cursor-not-allowed" : ""}>保存</Button></>}>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <Field label="公司名" required>
          <input autoFocus className={inputCls} value={form.company}
            onChange={e => setForm({ ...form, company: e.target.value })} placeholder="如：字节跳动" />
        </Field>
        <Field label="岗位名" required>
          <input className={inputCls} value={form.position}
            onChange={e => setForm({ ...form, position: e.target.value })} placeholder="如：产品经理实习" />
        </Field>
        <Field label="岗位类型">
          <select className={inputCls} value={form.type} onChange={e => setForm({ ...form, type: e.target.value })}>
            {TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="当前阶段">
          <select className={inputCls} value={form.stage} onChange={e => setForm({ ...form, stage: e.target.value })}>
            {STAGES.filter(s => s !== "已结束").map(s => <option key={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="投递日期">
          <input type="date" className={inputCls} value={form.appliedAt}
            onChange={e => setForm({ ...form, appliedAt: e.target.value })} />
        </Field>
        <div className="md:col-span-2">
          <Field label="岗位 JD" hint="可粘贴职位描述、要求、加分项等">
            <textarea rows="8" className={inputCls} value={form.jd}
              onChange={e => setForm({ ...form, jd: e.target.value })}
              placeholder={"示例：\n岗位职责\n1. 负责...\n\n任职要求\n1. 熟悉..."} />
          </Field>
        </div>
      </div>
    </Modal>
  );
}

  if (!open || !draft) return null;

  const patch = (p) => setDraft({ ...draft, ...p });
  const save = () => { onUpdate({ ...draft, updatedAt: Date.now() }); onClose(); };

  const addDeadline = () => patch({ deadlines: [...(draft.deadlines ?? []), { kind: "网申", date: todayStr() }] });
  const updDeadline = (i, p) => patch({ deadlines: draft.deadlines.map((d, idx) => idx === i ? { ...d, ...p } : d) });
  const delDeadline = (i) => patch({ deadlines: draft.deadlines.filter((_, idx) => idx !== i) });

  const addInterview = () => patch({
    interviews: [...(draft.interviews ?? []), { round: (draft.interviews?.length ?? 0) + 1, date: todayStr(), format: "线上", note: "" }]
  });
  const updInterview = (i, p) => patch({ interviews: draft.interviews.map((v, idx) => idx === i ? { ...v, ...p } : v) });

    <Modal open={open} onClose={onClose}
      title={draft.company || "申请详情"}
      subtitle={draft.position ? `${draft.position} · ${draft.type}` : undefined}
      footer={
        <>

// ─────────────────────────── Chatbox · utils ───────────────────────────
const CHAT_MAX_TURNS = 20;

const renderMarkdown = (text) => {
  if (!text) return "";
  if (!window.marked || !window.DOMPurify) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  const html = window.marked.parse(text, { breaks: true, gfm: true });
  return window.DOMPurify.sanitize(html, {
    ALLOWED_TAGS: ["p","br","strong","em","code","pre","ul","ol","li","hr","h1","h2","h3","blockquote","a","span"],
    ALLOWED_ATTR: ["href","target","rel","class"],
  });
};

const buildSnapshot = (apps) => {
  const distribution = Object.fromEntries(STAGES.map(s => [s, 0]));
  apps.forEach(a => { distribution[a.stage] = (distribution[a.stage] || 0) + 1; });
  const urgentDeadlines = [];
  apps.forEach(a => {
    const nd = nextDeadline(a);
    if (!nd) return;
    const daysLeft = diffDays(nd.date);
    if (daysLeft <= 7) urgentDeadlines.push({ company: a.company, kind: nd.kind, daysLeft });
  });
  urgentDeadlines.sort((a, b) => a.daysLeft - b.daysLeft);
  const activeInterviews = apps.filter(a => a.stage === "面试中").map(a => `${a.company} · ${a.position}`);
  const offers = apps.filter(a => a.stage === "Offer").map(a => `${a.company} · ${a.position}`);
  return { total: apps.length, distribution, urgentDeadlines, activeInterviews, offers };
};

const buildApplicationsContext = (apps) => apps.map(a => ({
  company: a.company,
  position: a.position,
  type: a.type,
  stage: a.stage,
  appliedAt: a.appliedAt || "",
  closeReason: a.closeReason || "",
  deadlines: (a.deadlines || []).map(d => ({ kind: d.kind, date: d.date })),
  materials: a.materials || {},
  interviews: (a.interviews || []).map(v => ({
    round: v.round,
    date: v.date,
    format: v.format,
    note: v.note || "",
  })),
  note: a.note || "",
  jd: a.jd || "",
}));

const generateQuickQuestions = (apps, snapshot) => {
  const qs = [];
  const urgent = snapshot.urgentDeadlines.find(u => u.daysLeft >= 0 && u.daysLeft <= 3);
  if (urgent) qs.push(`${urgent.company}截止日快到了，现在最该做什么？`);
  const interviewCount = apps.filter(a => a.stage === "面试中").length;
  if (interviewCount >= 2 && qs.length < 3) qs.push(`同时有 ${interviewCount} 家在面试，怎么分配准备时间？`);
  const offer = apps.find(a => a.stage === "Offer");
  if (offer && qs.length < 3) qs.push(`收到 ${offer.company} 的 Offer，怎么评估要不要接？`);
  const afterApply = apps.filter(a => ["已投递","笔试/测评","面试中","Offer","已结束"].includes(a.stage)).length;
  const interviewed = apps.filter(a => a.interviews?.length > 0 || ["面试中","Offer"].includes(a.stage)).length;
  if (afterApply >= 5 && interviewed / afterApply < 0.2 && qs.length < 3) {
    qs.push("投了很多但面试邀约少，简历可能哪里出了问题？");
  }
  if (qs.length < 3) qs.push("校招和实习申请的节奏有什么区别？");
  return qs.slice(0, 3);
};

// ─────────────────────────── Chatbox · useChat ───────────────────────────
function useChat(apps) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const abortRef = useRef(null);
  const appsRef = useRef(apps);
  useEffect(() => { appsRef.current = apps; }, [apps]);

  const send = async (rawText, rawAttachments = []) => {
    const text = (rawText || "").trim();
    const attachments = Array.isArray(rawAttachments) ? rawAttachments : [];
    if ((!text && attachments.length === 0) || loading) return;

    const userMsg = {
      role: "user",
      content: text || "已上传附件，请帮我分析。",
      attachments: attachments.map(att => ({
        id: att.id,
        name: att.name,
        kind: att.kind,
        sizeLabel: att.sizeLabel,
        displayType: att.displayType,
      })),
      apiContent: buildUserMessagePayload(text, attachments),
    };
    const history = [...messages, userMsg].slice(-CHAT_MAX_TURNS * 2);
    setMessages([...history, { role: "assistant", content: "", streaming: true }]);
    setLoading(true); setError(null);

    const controller = new AbortController();
    abortRef.current = controller;
    const timeoutId = setTimeout(() => controller.abort(new DOMException("timeout", "TimeoutError")), 60000);

    let accum = "";
    const flushAssistant = (patch) => {
      setMessages(prev => {
        const clone = [...prev];
        const last = clone[clone.length - 1];
        if (last && last.role === "assistant") clone[clone.length - 1] = { ...last, ...patch };
        return clone;
      });
    };

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: history.map(m => ({ role: m.role, content: m.apiContent ?? m.content })),
          snapshot: buildSnapshot(appsRef.current),
          applications: buildApplicationsContext(appsRef.current),
        }),
        signal: controller.signal,
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.message || `AI 助手暂时不可用（错误码：${res.status}）`);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let sawError = null;
      let sawDone = false;
      loop: while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";
        for (const line of lines) {
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (!data) continue;
          if (data === "[DONE]") { sawDone = true; break loop; }
          try {
            const j = JSON.parse(data);
            if (j.error) { sawError = j.error.message || "AI 助手暂时不可用"; break loop; }
            if (j.delta) { accum += j.delta; flushAssistant({ content: accum }); }
          } catch {}
        }
      }
      if (sawError) throw new Error(sawError);
      if (!accum.trim()) {
        throw new Error(sawDone ? "AI 暂时没有返回内容，请稍后重试" : "连接已中断，请稍后重试");
      }
      flushAssistant({ streaming: false });
    } catch (e) {
      const msg = e?.name === "AbortError" || e?.name === "TimeoutError"
        ? "网络开小差了，请稍后重试"
        : (e?.message || "AI 助手暂时不可用");
      setError(msg);
      // 移除未完成的 assistant 占位
      setMessages(prev => {
        const last = prev[prev.length - 1];
        if (last && last.role === "assistant" && last.streaming && !last.content) return prev.slice(0, -1);
        // 有部分内容也保留，但去掉 streaming 标志
        if (last && last.role === "assistant" && last.streaming) {
          const clone = [...prev];
          clone[clone.length - 1] = { ...last, streaming: false };
          return clone;
        }
        return prev;
      });
    } finally {
      clearTimeout(timeoutId);
      setLoading(false);
      abortRef.current = null;
    }
  };

  const clear = () => {
    if (messages.length === 0) return;
    if (!window.confirm("确定清空当前对话？")) return;
    abortRef.current?.abort();
    setMessages([]); setError(null);
  };

  return { messages, loading, error, send, clear };
}

// ─────────────────────────── Chatbox · atoms ───────────────────────────
function ThinkingDots({ className = "" }) {
  return <span className={`dot-bob inline-flex items-center ${className}`}><span/><span/><span/></span>;
}

function MsgBubble({ msg }) {
  const isUser = msg.role === "user";
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    navigator.clipboard?.writeText(msg.content);
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  };
  if (isUser) {
    return (
      <div className="flex justify-end">
        <div className="max-w-[85%] bg-zinc-900 text-white text-[13px] rounded-2xl rounded-br-md px-3.5 py-2.5 whitespace-pre-wrap break-words leading-relaxed space-y-2">
          {msg.content && <div>{msg.content}</div>}
          {!!msg.attachments?.length && (
            <div className="flex flex-wrap gap-2">
              {msg.attachments.map(att => (
                <span key={att.id} className="inline-flex items-center gap-1.5 rounded-lg bg-white/10 ring-1 ring-white/10 px-2.5 py-1 text-[11px] text-white/90">
                  <Icon name={att.kind === "image" ? "image" : "file"} className="w-3.5 h-3.5" />
                  <span>{att.name}</span>
                  <span className="text-white/60">{att.sizeLabel}</span>
                </span>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }
  const streamingTag = msg.streaming ? "<span class='chat-cursor'>▍</span>" : "";
  const html = renderMarkdown(msg.content) + (msg.streaming ? streamingTag : "");
  return (
    <div className="group flex justify-start">
      <div className="max-w-[92%] relative">
        <div
          className="chat-md bg-white ring-1 ring-zinc-200 text-[13px] text-zinc-800 rounded-2xl rounded-bl-md px-3.5 py-2.5 leading-relaxed break-words"
          dangerouslySetInnerHTML={{ __html: html || (msg.streaming ? "<span class='chat-cursor'>▍</span>" : "") }}
        />
        {!msg.streaming && msg.content && (
          <button
            onClick={copy}
            className="opacity-0 group-hover:opacity-100 transition absolute -bottom-2 left-3 text-[10px] bg-white ring-1 ring-zinc-200 rounded px-1.5 py-0.5 text-zinc-500 hover:text-zinc-900 shadow-sm">
            {copied ? "已复制" : "复制"}
          </button>
        )}
      </div>
    </div>
  );
}

function ChatIntro({ snapshot }) {
  const urgentCount = snapshot.urgentDeadlines.filter(u => u.daysLeft >= 0).length;
  return (
    <div className="text-[12.5px] text-zinc-700 leading-relaxed bg-white ring-1 ring-zinc-100 rounded-xl px-4 py-3">
      <div className="font-semibold text-zinc-900 mb-1.5">你好 👋 我是你的 AI 求职顾问</div>
      <div className="text-zinc-600">简历优化 · 面试准备 · Offer 决策 · 节奏规划，都可以问我。</div>
      <div className="text-[11px] text-zinc-500 mt-2.5 pt-2.5 border-t border-zinc-100 tnum">
        目前有 <b className="text-zinc-900">{snapshot.total}</b> 家 ·
        面试中 <b className="text-zinc-900">{snapshot.activeInterviews.length}</b> ·
        Offer <b className="text-zinc-900">{snapshot.offers.length}</b> ·
        紧急 <b className="text-zinc-900">{urgentCount}</b>
      </div>
    </div>
  );
}

function ChatInput({ onSend, loading, disabled }) {
  const [text, setText] = useState("");
  const [attachments, setAttachments] = useState([]);
  const [attaching, setAttaching] = useState(false);
  const [attachError, setAttachError] = useState("");
  const taRef = useRef(null);
  const fileRef = useRef(null);
  const send = () => {
    if ((!text.trim() && attachments.length === 0) || loading || disabled || attaching) return;
    onSend(text, attachments);
    setText("");
    setAttachments([]);
    setAttachError("");
    if (taRef.current) taRef.current.style.height = "auto";
    if (fileRef.current) fileRef.current.value = "";
  };
  const handleInput = (e) => {
    setText(e.target.value);
    const el = e.target;
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 96) + "px";
  };
  const removeAttachment = (id) => setAttachments(prev => prev.filter(att => att.id !== id));
  const pickFiles = () => fileRef.current?.click();
  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length) return;
    if (attachments.length + files.length > MAX_CHAT_ATTACHMENTS) {
      setAttachError(`一次最多上传 ${MAX_CHAT_ATTACHMENTS} 个文件/图片`);
      return;
    }
    setAttaching(true);
    setAttachError("");
    const prepared = [];
    try {
      for (const file of files) {
        prepared.push(await prepareChatAttachment(file));
      }
      setAttachments(prev => [...prev, ...prepared]);
    } catch (err) {
      setAttachError(err?.message || "附件处理失败");
    } finally {
      setAttaching(false);
    }
  };
  return (
    <div className="border-t border-zinc-100 bg-white px-3 py-2.5 shrink-0">
      <input
        ref={fileRef}
        type="file"
        multiple
        accept=".pdf,.docx,.txt,.md,.markdown,image/*"
        className="hidden"
        onChange={handleFiles}
      />
      {(attachments.length > 0 || attachError) && (
        <div className="mb-2 space-y-2">
          {attachments.length > 0 && (
            <div className="flex flex-wrap gap-2">
              {attachments.map(att => (
                <div key={att.id} className="inline-flex items-center gap-2 rounded-lg bg-zinc-50 ring-1 ring-zinc-200 px-2.5 py-1.5 text-[11px] text-zinc-700">
                  <Icon name={att.kind === "image" ? "image" : "file"} className="w-3.5 h-3.5 text-zinc-500" />
                  <span className="max-w-[160px] truncate">{att.name}</span>
                  <span className="text-zinc-400">{att.sizeLabel}</span>
                  <button onClick={() => removeAttachment(att.id)} className="text-zinc-400 hover:text-zinc-900">
                    <Icon name="close" className="w-3.5 h-3.5" />
                  </button>
                </div>
              ))}
            </div>
          )}
          {attachError && <div className="text-[11px] text-rose-600">{attachError}</div>}
        </div>
      )}
      <div className="flex items-end gap-2 bg-zinc-50 ring-1 ring-zinc-200 rounded-xl px-3 py-2 focus-within:ring-zinc-900 focus-within:bg-white transition">
        <button
          type="button"
          onClick={pickFiles}
          disabled={loading || disabled || attaching || attachments.length >= MAX_CHAT_ATTACHMENTS}
          className="w-8 h-8 rounded-lg text-zinc-500 flex items-center justify-center hover:bg-white hover:text-zinc-900 disabled:opacity-40 disabled:cursor-not-allowed transition shrink-0"
          title="上传简历文件或图片">
          <Icon name="paperclip" className="w-4 h-4" />
        </button>
        <textarea
          ref={taRef}
          rows="1"
          value={text}
          onChange={handleInput}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder={disabled ? "AI 助手未配置" : loading ? "AI 思考中…" : attaching ? "正在处理附件…" : "可上传简历 PDF/DOCX/图片，再提问 · Enter 发送"}
          disabled={disabled}
          className="flex-1 bg-transparent text-[13px] placeholder:text-zinc-400 resize-none outline-none leading-relaxed"
          style={{ minHeight: "20px", maxHeight: "96px" }}
        />
        <button onClick={send} disabled={(!text.trim() && attachments.length === 0) || loading || disabled || attaching}
          className="w-8 h-8 rounded-lg bg-zinc-900 text-white flex items-center justify-center hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed transition shrink-0">
          {loading ? <ThinkingDots /> : <Icon name="chevron" className="w-4 h-4 -rotate-90" />}
        </button>
      </div>
      <div className="mt-1.5 text-[10.5px] text-zinc-400">
        支持 PDF、DOCX、TXT、Markdown 和图片，适合上传简历、岗位截图或项目材料。
      </div>
    </div>
  );
}

function ChatHeader({ onClear, onClose, hasMessages }) {
  return (
    <div className="flex items-center justify-between px-4 py-3 border-b border-zinc-100 bg-white shrink-0">
      <div className="flex items-center gap-2.5">
        <div className="relative w-8 h-8 rounded-xl bg-zinc-900 text-white flex items-center justify-center elevate-1">
          <Icon name="sparkle" className="w-4 h-4" />
          <span className="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-emerald-500 ring-2 ring-white" />
        </div>
        <div>
          <div className="text-[13px] font-semibold text-zinc-900 leading-tight">AI 求职助手</div>
          <div className="text-[10.5px] text-zinc-500 mt-0.5">基于你的申请数据给建议</div>
        </div>
      </div>
      <div className="flex items-center gap-0.5">
        {hasMessages && (
          <button onClick={onClear} className="text-[11px] text-zinc-500 hover:text-zinc-900 px-2 py-1 rounded-md hover:bg-zinc-100 transition">清空</button>
        )}
        <button onClick={onClose} className="w-7 h-7 rounded-md text-zinc-400 hover:text-zinc-900 hover:bg-zinc-100 flex items-center justify-center">
          <Icon name="close" className="w-4 h-4" />
        </button>
      </div>
    </div>
  );
}

function ChatPanel({ apps, chat, configured, onClose, isMobile }) {
  const snapshot = useMemo(() => buildSnapshot(apps), [apps]);
  const quickQs = useMemo(() => generateQuickQuestions(apps, snapshot), [apps, snapshot]);
  const scrollRef = useRef(null);

  useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
  }, [chat.messages]);

  const shellCls = isMobile
    ? "chat-panel-mobile fixed inset-x-0 bottom-0 z-50 h-[72vh] rounded-t-2xl flex flex-col bg-white overflow-hidden elevate-modal"
    : "chat-panel-desktop fixed z-50 bottom-24 right-6 w-[380px] h-[560px] flex flex-col bg-white rounded-2xl overflow-hidden elevate-modal";

  return (
    <>
      {isMobile && <div className="fixed inset-0 z-40 bg-zinc-900/30" onClick={onClose} />}
      <div className={shellCls}>
        <ChatHeader onClear={chat.clear} onClose={onClose} hasMessages={chat.messages.length > 0} />
        <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-3 space-y-3 bg-zinc-50/40">
          {chat.messages.length === 0 && <ChatIntro snapshot={snapshot} />}
          {chat.messages.map((m, i) => <MsgBubble key={i} msg={m} />)}
          {chat.error && (
            <div className="text-[12px] text-rose-700 bg-rose-50 ring-1 ring-rose-200 rounded-lg px-3 py-2">
              {chat.error}
            </div>
          )}
        </div>
        {chat.messages.length === 0 && quickQs.length > 0 && configured !== false && (
          <div className="px-4 pt-2 pb-1 space-y-1.5 bg-zinc-50/40 border-t border-zinc-100">
            <div className="text-[10px] uppercase tracking-wider text-zinc-500 font-medium pb-0.5">快捷问题</div>
            {quickQs.map((q, i) => (
              <button key={i} onClick={() => chat.send(q)} disabled={chat.loading}
                className="w-full text-left text-[12.5px] text-zinc-700 bg-white ring-1 ring-zinc-200 hover:ring-zinc-900 hover:bg-zinc-900 hover:text-white transition rounded-lg px-3 py-2 disabled:opacity-50">
                {q}
              </button>
            ))}
          </div>
        )}
        {configured === false && (
          <div className="text-[11.5px] text-amber-800 bg-amber-50 px-4 py-2 border-t border-amber-200">
            AI 助手未配置，请在 <code className="text-amber-900 bg-amber-100 rounded px-1">.env</code> 中填写 <code className="text-amber-900 bg-amber-100 rounded px-1">OPENAI_API_KEY</code> 与 <code className="text-amber-900 bg-amber-100 rounded px-1">OPENAI_MODEL</code>
          </div>
        )}
        <ChatInput onSend={chat.send} loading={chat.loading} disabled={configured === false} />
      </div>
    </>
  );
}

function Chatbox({ apps, isMobile }) {
  const [open, setOpen] = useState(false);
  const [configured, setConfigured] = useState(null);
  const chat = useChat(apps);

  useEffect(() => {
    fetch("/api/health")
      .then(r => r.ok ? r.json() : { configured: false })
      .then(j => setConfigured(!!j.configured))
      .catch(() => setConfigured(false));
  }, []);

  useEffect(() => {
    if (!open) return;
    const onEsc = (e) => { if (e.key === "Escape") setOpen(false); };
    window.addEventListener("keydown", onEsc);
    return () => window.removeEventListener("keydown", onEsc);
  }, [open]);

  return (
    <>
      <button
        onClick={() => setOpen(true)}
        aria-label="打开 AI 求职助手"
        className={`fixed bottom-6 right-6 w-14 h-14 rounded-full bg-zinc-900 text-white flex items-center justify-center elevate-2 hover:scale-105 active:scale-95 transition-all z-30 ${open ? "opacity-0 pointer-events-none scale-90" : "opacity-100"}`}>
        <Icon name="sparkle" className="w-5 h-5" />
        <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-emerald-400 ring-2 ring-zinc-900" />
      </button>
      {open && (
        <ChatPanel apps={apps} chat={chat} configured={configured} isMobile={isMobile}
          onClose={() => setOpen(false)} />
      )}
    </>
  );
}

// ─────────────────────────── App ───────────────────────────
function App() {
  const [apps, setApps] = useApplications();
  const isMobile = useIsMobile();
  const [view, setView] = useState("kanban");
  useEffect(() => { if (isMobile) setView("list"); }, [isMobile]);

  const [detailId, setDetailId] = useState(null);
  const [creating, setCreating] = useState(false);
  const [quickAddStage, setQuickAddStage] = useState(null);
  const [closeReasonFor, setCloseReasonFor] = useState(null);

  const detailApp = apps.find(a => a.id === detailId);

  const handleCreate = (app) => {
    setApps(prev => [app, ...prev]);
    setCreating(false);
    setQuickAddStage(null);
  };
  const handleUpdate = (app) => setApps(prev => prev.map(a => a.id === app.id ? app : a));
  const handleDelete = (id) => setApps(prev => prev.filter(a => a.id !== id));
  const confirmCloseReason = (reason) => {
    setApps(prev => prev.map(a => a.id === closeReasonFor ? { ...a, stage: "已结束", closeReason: reason, updatedAt: Date.now() } : a));
    setCloseReasonFor(null);
  };

  return (
    <div className="min-h-full max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-8 space-y-5 md:space-y-6">
      <TopBar apps={apps} view={view} setView={setView} isMobile={isMobile}
        onCreate={() => { setQuickAddStage(null); setCreating(true); }}
        onOpen={(id) => setDetailId(id)} />

      {isMobile && (
        <div className="text-[12px] text-amber-800 bg-amber-50 ring-1 ring-amber-200 rounded-xl px-4 py-2.5">
          手机屏幕已自动切换为列表视图，看板视图请使用更大屏幕。
        </div>
      )}

      {view === "kanban" && !isMobile
        ? <KanbanView apps={apps} setApps={setApps}
            onOpen={(id) => setDetailId(id)}
            onQuickAdd={(s) => { setQuickAddStage(s); setCreating(true); }}
            setCloseReasonFor={setCloseReasonFor} />
        : <ListView apps={apps} onOpen={(id) => setDetailId(id)} />
      }

      <CreateModal open={creating} onClose={() => { setCreating(false); setQuickAddStage(null); }}
        onSave={handleCreate} initialStage={quickAddStage} />

      <DetailModal open={!!detailApp} app={detailApp} onClose={() => setDetailId(null)}
        onUpdate={handleUpdate} onDelete={handleDelete} />

      <CloseReasonModal open={!!closeReasonFor}
        onConfirm={confirmCloseReason} onCancel={() => setCloseReasonFor(null)} />

      <Chatbox apps={apps} isMobile={isMobile} />

      <footer className="text-center text-[11px] text-zinc-400 pt-6 pb-2 tracking-wide">
        数据保存在浏览器 localStorage · 清空浏览器数据会丢失申请记录
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
